<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie Rating</title>
  <style>
    body{
      text-align:center;
      font-family: Arial, sans-serif;
      background-color:#111;
      color:#fff;
      padding:30px;
    }
    h1{ color:#00ffcc; }
    .card{
      margin: 0 auto;
      max-width: 520px;
      background:#1e1e1e;
      border:1px solid #333;
      border-radius:12px;
      padding:22px;
    }
    input{
      width: 90%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #333;
      outline: none;
      margin-top: 10px;
      background:#0f0f0f;
      color:#fff;
    }
    button{
      margin-top: 12px;
      padding: 10px 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background:#00ffcc;
      color:#000;
      font-weight:bold;
    }
    .result{
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      background:#0f0f0f;
      border:1px solid #333;
      font-size: 18px;
    }
    .small{
      color:#bbb;
      margin-top: 14px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>Movie Rating App</h1>

  <div class="card">
    <h2>Find Movie Rating</h2>

    <input id="movieName" placeholder="Enter movie name (ex: Inception)" />
    <button onclick="showRating()">Show Rating</button>

    <div class="result" id="output">Enter a movie name and click "Show Rating".</div>

    <div class="small">
      Deployed using Jenkins + Docker + Kubernetes<br/>
      (Service Port: 8090)
    </div>
  </div>

  <script>
    // Static ratings (demo data for assignment)
    const ratings = {
      "inception": 8.8,
      "interstellar": 8.6,
      "avatar": 7.9,
      "titanic": 7.9,
      "joker": 8.4,
      "bahubali": 8.0,
      "rrr": 7.8,
      "kgf": 8.2
    };

    function showRating() {
      const movie = document.getElementById("movieName").value.trim().toLowerCase();
      const out = document.getElementById("output");

      if (!movie) {
        out.innerHTML = "❌ Please enter a movie name.";
        return;
      }

      if (ratings[movie] !== undefined) {
        out.innerHTML = `✅ Rating of <b>${movie.toUpperCase()}</b> is <b>${ratings[movie]}</b> / 10`;
      } else {
        out.innerHTML = `⚠️ Movie not found in demo list. Try: Inception, Interstellar, Joker, RRR...`;
      }
    }
  </script>
</body>
</html>
